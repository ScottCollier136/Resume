# Sample configuration for a standalone Kafka Connect worker that uses Avro serialization and
# integrates the the Schema Registry. This sample configuration assumes a local installation of
# Confluent Platform with all services running on their default ports.

# Bootstrap Kafka servers. If multiple servers are specified, they should be comma-separated.
bootstrap.servers=kafka:9092


key.converter=org.apache.kafka.connect.json.JsonConverter
value.converter=org.apache.kafka.connect.json.JsonConverter
key.converter.schemas.enable=false
value.converter.schemas.enable=true

# from more information, visit: http://docs.confluent.io/3.2.0/connect/userguide.html#common-worker-configs
#bootstrap.servers=127.0.0.1:9092
#key.converter=org.apache.kafka.connect.json.JsonConverter
#key.converter.schemas.enable=false
#value.converter=org.apache.kafka.connect.json.JsonConverter
#value.converter.schemas.enable=false
# we always leave the internal key to JsonConverter
#internal.key.converter=org.apache.kafka.connect.json.JsonConverter
#internal.key.converter.schemas.enable=false
#internal.value.converter=org.apache.kafka.connect.json.JsonConverter
#internal.value.converter.schemas.enable=false
# Rest API
#rest.port=8086
#rest.host.name=127.0.0.1
# this config is only for standalone workers
#offset.storage.file.filename=standalone.offsets
#offset.flush.interval.ms=10000

# The converters specify the format of data in Kafka and how to translate it into Connect data.
# Every Connect user will need to configure these based on the format they want their data in
# when loaded from or stored into Kafka


# The internal converter used for offsets and config data is configurable and must be specified,
# but most users will always want to use the built-in default. Offset and config data is never
# visible outside of Connect in this format.

# internal.key.converter=org.apache.kafka.connect.json.JsonConverter
# internal.value.converter=org.apache.kafka.connect.json.JsonConverter
# internal.key.converter.schemas.enable=true
# internal.value.converter.schemas.enable=true

# Local storage file for offset data
offset.storage.file.filename=/tmp/postgresConnect.offsets


# set the rest port from the default 8083
# the source connector is already using port 8083
rest.port=8083
rest.advertised.port=8083


# Set to a list of filesystem paths separated by commas (,) to enable class loading isolation for plugins
# (connectors, converters, transformations). The list should consist of top level directories that include
# any combination of:
# a) directories immediately containing jars with plugins and their dependencies
# b) uber-jars with plugins and their dependencies
# c) directories immediately containing the package directory structure of classes of plugins and their dependencies
# Examples:
# plugin.path=/usr/local/share/java,/usr/local/share/kafka/plugins,/opt/connectors,
plugin.path=/usr/share/java,/usr/share/confluent-hub-components,/custom_smt/built-transformations
